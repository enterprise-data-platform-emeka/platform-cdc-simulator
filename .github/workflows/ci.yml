name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.env.example'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.env.example'

jobs:
  # ── Lint and type check ─────────────────────────────────────────────────────
  # Runs first, fast, no database required.
  # If linting fails there is no point running the slower test job.
  quality:
    name: Lint and type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11.8
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.8"
          cache: "pip"

      - name: Install dev dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check simulator/ main.py tests/

      - name: Type check (mypy)
        run: mypy simulator/ main.py --ignore-missing-imports

  # ── Unit tests ──────────────────────────────────────────────────────────────
  # No database required. Runs in parallel with the quality job.
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11.8
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.8"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run unit tests
        run: pytest tests/ -m "not integration" --cov=simulator --cov-report=xml
        env:
          # ENVIRONMENT is required by config.py even for unit tests
          ENVIRONMENT: dev

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ── Integration tests ───────────────────────────────────────────────────────
  # Requires a real PostgreSQL instance.
  # GitHub Actions spins one up as a "service container" automatically.
  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [quality, unit-tests]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ecommerce_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ENVIRONMENT: dev
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: ecommerce_test
      DB_USER: postgres
      DB_PASSWORD: testpass

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11.8
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.8"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run integration tests
        run: pytest tests/ -m integration -v

  # ── Docker build ────────────────────────────────────────────────────────────
  # Verifies the Dockerfile builds successfully on every push and pull request.
  # Never pushes in CI — pushing is handled by deploy.yml after CI passes on main.
  # This separation keeps CI fast and ensures only validated images are promoted.
  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [quality, unit-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ghcr.io/${{ github.repository }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
