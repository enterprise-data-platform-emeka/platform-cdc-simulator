name: Deploy

# Builds and pushes the CDC simulator Docker image to GitHub Container
# Registry (GHCR) for the target environment.
#
# What "deploy" means here:
#   Build the image and push to GHCR with environment-specific tags:
#     dev:     ghcr.io/{repo}:dev, ghcr.io/{repo}:dev-{sha}
#     staging: ghcr.io/{repo}:staging, ghcr.io/{repo}:staging-{sha}
#     prod:    ghcr.io/{repo}:prod, ghcr.io/{repo}:prod-{sha}, ghcr.io/{repo}:latest
#
# Triggers:
#   - CI completes on main  → automatically builds and pushes :dev image
#   - workflow_dispatch     → manually promotes to staging or prod
#
# Promotion path: dev (auto) → staging (manual) → prod (manual + approval)
#
# GitHub Environment protection rules enforce the gates:
#   dev     - no protection, auto-deploys after CI passes
#   staging - required reviewers before the job runs
#   prod    - required reviewers + deployment protection rules
#
# No AWS credentials needed — this workflow only pushes to GHCR using the
# built-in GITHUB_TOKEN.

on:
  # Triggers only after CI completes successfully on main.
  # This ensures tests and Docker build pass before any image is pushed.
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

  # Manual trigger for promoting to staging or prod.
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [staging, prod]

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}

    # When triggered by workflow_run, only proceed if CI actually passed.
    # workflow_dispatch bypasses this check, manual deploys are intentional.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      packages: write

    env:
      ENV: ${{ inputs.environment || 'dev' }}
      REGISTRY: ghcr.io
      IMAGE: ghcr.io/${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve commit SHA
        # For workflow_run triggers, the SHA is on the triggering workflow's
        # head commit. For workflow_dispatch, use the current SHA.
        id: sha
        run: |
          SHA=${{ github.event.workflow_run.head_sha || github.sha }}
          echo "value=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.ENV }}
            ${{ env.IMAGE }}:${{ env.ENV }}-${{ steps.sha.outputs.value }}
            ${{ env.ENV == 'prod' && format('{0}:latest', env.IMAGE) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deployment summary
        run: |
          echo ""
          echo "CDC simulator image pushed to GHCR:"
          echo "  ${{ env.IMAGE }}:${{ env.ENV }}"
          echo "  ${{ env.IMAGE }}:${{ env.ENV }}-${{ steps.sha.outputs.value }}"
          if [ "${{ env.ENV }}" = "prod" ]; then
            echo "  ${{ env.IMAGE }}:latest"
          fi
