# Docker Compose for local development.
#
# Two services:
#   postgres   — a local PostgreSQL database (replaces AWS RDS during local testing)
#   simulator  — the CDC simulator container (optional, see notes below)
#
# Quick start (local Postgres only, simulator runs on your machine):
#   make docker-up
#   make schema
#   make seed
#   make simulate
#
# Full containerised stack (everything in Docker):
#   make docker-simulate
#
# Stop everything:
#   make docker-down

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localpass
    ports:
      # Maps container port 5432 to your Mac on 5432.
      # After make docker-up, connect with: DB_HOST=localhost DB_PORT=5432
      - "5432:5432"
    volumes:
      # Named volume persists data between docker-compose down / up cycles.
      # Remove with: docker volume rm platform-cdc-simulator_postgres_data
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Simulator (containerised) ─────────────────────────────────────────────
  # This service runs the simulator inside a Docker container.
  # Use it with: make docker-simulate
  # For day-to-day dev work, it is easier to run the simulator on your Mac
  # (make simulate) and only use this service for integration testing or CI.
  simulator:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ENVIRONMENT: dev
      DB_HOST: postgres       # Use the Docker service name, not localhost
      DB_PORT: 5432
      DB_NAME: ecommerce
      DB_USER: postgres
      DB_PASSWORD: localpass
      SIM_TICK_INTERVAL_SECONDS: 2
      SIM_NEW_ORDERS_PER_TICK: 3
    command: simulate
    # Do not start the simulator automatically — only when explicitly requested
    profiles:
      - full-stack

volumes:
  postgres_data:
